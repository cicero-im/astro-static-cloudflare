# Rename this worker and adjust routes for your own domain.
name = "astro-static-cloudflare"
compatibility_date = "2026-04-09"

[assets]
directory = "dist"
not_found_handling = "404-page"
html_handling = "auto-trailing-slash"

# Uncomment and edit to attach a custom domain.
# [[routes]]
# pattern = "example.com"
# custom_domain = true
#
# [[routes]]
# pattern = "www.example.com/*"
# zone_name = "example.com"

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1
